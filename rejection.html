<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>التجاري وفا بنك - تم رفض الطلب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-coral: #FF6B4A;
            --background-dark: #0F1419;
            --card-bg: #1A2332;
            --text-white: #FFFFFF;
            --text-muted: #6B7280;
            --error-red: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--background-dark); 
            color: var(--text-white); 
            direction: rtl; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .rejection-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 77, 77, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: var(--error-red);
        }

        .icon-box svg {
            width: 40px;
            height: 40px;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-white);
        }

        .message {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 35px;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-coral);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .action-btn:active { transform: scale(0.98); opacity: 0.9; }

        .support-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 14px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .support-link:hover { color: var(--primary-coral); }
    </style>
</head>
<body>
    <div class="rejection-card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>
        <h1 class="title">عذراً، تعذر إتمام الطلب</h1>
        <p class="message">لقد تم رفض طلبك بسبب خطأ في البيانات المدخلة أو عدم توافقها مع معايير الأمان لدينا. يرجى المحاولة مرة أخرى ببيانات صحيحة.</p>
        <button class="action-btn" onclick="window.location.href='login.html'">العودة للمحاولة مرة أخرى</button>
        <a href="#" class="support-link">اتصل بالدعم الفني</a>
    </div>
</body>
</html>
